# LibreChat Configuration - Test Setup (no Turnstile)
# This configuration is for testing with the official LibreChat image

version: 1.3.13

cache: true

interface:
  customWelcome: 'Benvingut a BruCusChat!'
  fileSearch: true
  privacyPolicy:
    externalUrl: ''
    openNewTab: false
  termsOfService:
    externalUrl: ''
    openNewTab: false
  modelSelect: true
  parameters: true
  presets: true
  prompts:
    use: true
    create: true
    share: false
    public: false
  bookmarks: true
  multiConvo: true
  agents:
    use: true
    create: true
    share: false
    public: false
  peoplePicker:
    users: true
    groups: true
    roles: true
  marketplace:
    use: false
  fileCitations: true

registration:
  socialLogins: []

# Speech (TTS/STT)
speech:
  tts:
    localai:
      url: 'http://localai:8080/v1/audio/speech'
      apiKey: ''
      model: 'tts-1'
      backend: 'piper'
      voices:
        - 'ca_ES-upc_ona-medium'
        - 'ca_ES-upc_pau-medium'
        - 'es_ES-sharvard-medium'
        - 'es_ES-davefx-medium'
        - 'en_US-amy-medium'
        - 'en_US-joe-medium'
        - 'fr_FR-siwis-medium'
        - 'fr_FR-gilles-medium'
        - 'it_IT-paola-medium'
        - 'it_IT-riccardo-medium'
  stt:
    openai:
      url: 'http://localai:8080/v1/audio/transcriptions'
      apiKey: ''
      model: 'whisper-1'
  speechTab:
    textToSpeech: true
    speechToText: true
    autoSendSpeech: true
    preferredVoice: 'ca_ES-upc_ona-medium'

# Web Search Configuration
webSearch:
  searchProvider: searxng
  searxngInstanceUrl: '${SEARXNG_INSTANCE_URL}'
  scraperProvider: tavily
  tavilyApiKey: '${TAVILY_API_KEY}'
  rerankerType: jina
  jinaApiKey: '${JINA_API_KEY}'

endpoints:
  agents:
    recursionLimit: 25
    maxRecursionLimit: 50
    capabilities: ["file_search", "actions", "tools"]

  custom:
    # Ollama (local models - basic configuration)
    - name: 'Ollama'
      apiKey: 'ollama'
      baseURL: 'http://ollama:11434/v1/'
      models:
        default:
          - 'qwen2.5'
          - 'deepseek-r1'
        fetch: true
      titleConvo: true
      titleModel: 'current_model'
      modelDisplayLabel: 'Ollama (Local)'

  allowedAddresses:
    - 'ollama:11434'
    - 'localhost:11434'
    - '127.0.0.1:11434'
    - 'host.docker.internal:11434'

actions:
  allowedDomains:
    - 'dashscope-intl.aliyuncs.com'
    - 'dashscope.aliyuncs.com'
  allowedAddresses:
    - 'ollama:11434'
    - 'localhost:11434'
    - '127.0.0.1:11434'
