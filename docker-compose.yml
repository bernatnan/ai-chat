services:
  api:
    container_name: LibreChat
    build:
      context: ./librechat
      dockerfile: Dockerfile.custom
    ports:
      - "${PORT:-3080}:${PORT:-3080}"
    depends_on:
      - mongodb
      - rag_api
      - searxng
      - localai
    restart: always
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - HOST=0.0.0.0
      - MONGO_URI=mongodb://mongodb:27017/LibreChat
      - MEILI_HOST=http://meilisearch:7700
      - RAG_PORT=${RAG_PORT:-8000}
      - RAG_API_URL=http://rag_api:${RAG_PORT:-8000}
      - NO_PROXY=${NO_PROXY:-localhost,127.0.0.1,::1},mongodb,meilisearch,rag_api,vectordb,host.docker.internal,ollama,searxng,valkey,localai
    volumes:
      - ./.env:/app/.env
      - ./librechat.yaml:/app/librechat.yaml
      - ./images:/app/client/public/images
      - ./assets:/app/assets-custom
      - ./scripts/docker-entrypoint.sh:/app/docker-entrypoint.sh:ro
      - ./uploads:/app/uploads
      - ./generated_files:/app/generated_files
      - ./logs:/app/logs
      - ./skill:/app/skill
    command: ["/app/docker-entrypoint.sh"]

  mongodb:
    container_name: chat-mongodb
    image: mongo:8.0.20
    restart: always
    volumes:
      - ./data-node:/data/db
    command: mongod --noauth

  meilisearch:
    container_name: chat-meilisearch
    image: getmeili/meilisearch:v1.35.1
    restart: always
    environment:
      - MEILI_HOST=http://meilisearch:7700
      - MEILI_NO_ANALYTICS=true
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY}
    volumes:
      - ./meili_data:/meili_data

  vectordb:
    container_name: vectordb
    image: pgvector/pgvector:0.8.0-pg15-trixie
    environment:
      POSTGRES_DB: mydatabase
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
    restart: always
    volumes:
      - pgdata:/var/lib/postgresql/data

  rag_api:
    container_name: rag_api
    image: registry.librechat.ai/danny-avila/librechat-rag-api-dev-lite:latest
    environment:
      - DB_HOST=vectordb
      - RAG_PORT=${RAG_PORT:-8000}
    restart: always
    depends_on:
      - vectordb
    env_file:
      - .env

  ollama:
    container_name: ollama
    image: ollama/ollama:latest
    restart: always
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  searxng:
    container_name: searxng
    image: docker.io/searxng/searxng:latest
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SEARXNG_SECRET=${SEARXNG_SECRET}
      - SEARXNG_LIMITER=false
      - SEARXNG_PUBLIC_INSTANCE=false
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
      - searxng_data:/var/cache/searxng
    depends_on:
      - valkey

  valkey:
    container_name: searxng-valkey
    image: docker.io/valkey/valkey:9-alpine
    restart: always
    command: valkey-server --save 30 1 --loglevel warning
    volumes:
      - valkey_data:/data

  admin-panel:
    container_name: librechat-admin-panel
    image: ghcr.io/clickhouse/librechat-admin-panel:latest
    restart: always
    ports:
      - "127.0.0.1:${ADMIN_PANEL_PORT:-3000}:3000"
    environment:
      - SESSION_SECRET=${ADMIN_PANEL_SESSION_SECRET}
      - VITE_API_BASE_URL=${DOMAIN_CLIENT}
      - API_SERVER_URL=http://api:3080
      - SESSION_COOKIE_SECURE=true
    depends_on:
      - api
    extra_hosts:
      - "host.docker.internal:host-gateway"

  localai:
    container_name: localai
    image: localai/localai:master-ffmpeg-core
    restart: always
    ports:
      - "${LOCALAI_PORT:-8180}:8080"
    environment:
      - THREADS=${LOCALAI_THREADS:-4}
    volumes:
      - localai_models:/build/models
      - ./localai/config.yaml:/build/models/config.yaml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  pgdata:
  ollama_data:
  searxng_data:
  valkey_data:
  localai_models:
