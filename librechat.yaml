# LibreChat Configuration - Basic Setup
# This configuration only includes basic Ollama models
# Ideal for initial testing or resource-limited environments

version: 1.3.13

cache: true

interface:
  customWelcome: 'Welcome to LibreChat!'
  fileSearch: true
  privacyPolicy:
    externalUrl: ''
    openNewTab: false
  termsOfService:
    externalUrl: ''
    openNewTab: false
  modelSelect: true
  parameters: true
  presets: true
  prompts:
    use: true
    create: true
    share: false
    public: false
  bookmarks: true
  multiConvo: true
  agents:
    use: true
    create: true
    share: false
    public: false
  peoplePicker:
    users: true
    groups: true
    roles: true
  marketplace:
    use: false
  fileCitations: true

# Cloudflare Turnstile
# NOTE: This base configuration does not include Turnstile.
# To enable it, copy this file to librechat.yaml.local and add the turnstile section:
#
# turnstile:
#   siteKey: 'YOUR_SITE_KEY'
#   options:
#     language: "ca"
#     size: "normal"

registration:
  socialLogins: []

# Speech (TTS/STT)
speech:
  tts:
    localai:
      url: 'http://localai:8180'
      apiKey: ''
      model: 'tts-1'
      backend: 'piper'
      voices:
        - 'ca_ES-upc_ona-medium'
        - 'ca_ES-upc_pau-medium'
        - 'es_ES-sharvard-medium'
        - 'es_ES-davefx-medium'
        - 'en_US-amy-medium'
        - 'en_US-joe-medium'
        - 'fr_FR-siwis-medium'
        - 'fr_FR-gilles-medium'
        - 'it_IT-paola-medium'
        - 'it_IT-riccardo-medium'
  stt:
    openai:
      url: 'http://localai:8180/v1'
      apiKey: ''
      model: 'whisper-1'
  speechTab:
    textToSpeech: true
    speechToText: true
    autoSendSpeech: true
    preferredVoice: 'ca_ES-upc_ona-medium'

# Web Search Configuration
webSearch:
  searchProvider: searxng
  searxngInstanceUrl: '${SEARXNG_INSTANCE_URL}'
  scraperProvider: tavily
  tavilyApiKey: '${TAVILY_API_KEY}'
  rerankerType: jina
  jinaApiKey: '${JINA_API_KEY}'

endpoints:
  agents:
    recursionLimit: 25
    maxRecursionLimit: 50
    capabilities: ["file_search", "actions", "tools"]

  custom:
    # Ollama (local models - basic configuration)
    - name: 'Ollama'
      apiKey: 'ollama'
      baseURL: 'http://ollama:11434/v1/'
      models:
        default:
          - 'qwen2.5'
          - 'deepseek-r1'
        fetch: true
      titleConvo: true
      titleModel: 'current_model'
      modelDisplayLabel: 'Ollama (Local)'

  allowedAddresses:
    - 'ollama:11434'
    - 'localhost:11434'
    - '127.0.0.1:11434'
    - 'host.docker.internal:11434'

# MCP Servers
mcpServers:
  qwen-image:
    type: stdio
    command: node
    args:
      - '/app/mcp-servers/qwen-image/index.js'
    env:
      DASHSCOPE_API_KEY: '${QWEN_API_KEY}'
    timeout: 120000

  document-generator:
    type: stdio
    command: node
    args:
      - '/app/mcp-servers/document-generator/index.js'
    env:
      DOCUMENTS_PATH: '/app/client/public/images/documents'
      DOCUMENTS_BASE_URL: '${DOMAIN_CLIENT}'
    timeout: 120000

actions:
  allowedDomains:
    - 'dashscope-intl.aliyuncs.com'
    - 'dashscope.aliyuncs.com'
  allowedAddresses:
    - 'ollama:11434'
    - 'localhost:11434'
    - '127.0.0.1:11434'
