# LlibreChat Configuration - Configuració Bàsica
# Aquesta configuració només inclou models Ollama bàsics
# Ideal per a proves inicials o entorns amb recursos limitats

version: 1.3.13

cache: true

interface:
  customWelcome: 'Benvingut a LibreChat!'
  fileSearch: true
  privacyPolicy:
    externalUrl: ''
    openNewTab: false
  termsOfService:
    externalUrl: ''
    openNewTab: false
  modelSelect: true
  parameters: true
  presets: true
  prompts:
    use: true
    create: true
    share: false
    public: false
  bookmarks: true
  multiConvo: true
  agents:
    use: true
    create: true
    share: false
    public: false
  peoplePicker:
    users: true
    groups: true
    roles: true
  marketplace:
    use: false
  fileCitations: true

# Cloudflare Turnstile
# NOTA: Aquesta configuració base no inclou Turnstile.
# Per activar-lo, copia aquest fitxer a librechat.yaml.local i afegeix la secció turnstile:
#
# turnstile:
#   siteKey: 'LA_TEVA_SITE_KEY'
#   options:
#     language: "ca"
#     size: "normal"

registration:
  socialLogins: []

# Web Search Configuration
webSearch:
  searchProvider: searxng
  searxngInstanceUrl: '${SEARXNG_INSTANCE_URL}'
  scraperProvider: tavily
  tavilyApiKey: '${TAVILY_API_KEY}'
  rerankerType: jina
  jinaApiKey: '${JINA_API_KEY}'

endpoints:
  custom:
    # Ollama (models locals - configuració bàsica)
    - name: 'Ollama'
      apiKey: 'ollama'
      baseURL: 'http://ollama:11434/v1/'
      models:
        default:
          - 'qwen2.5'
          - 'deepseek-r1'
        fetch: true
      titleConvo: true
      titleModel: 'current_model'
      modelDisplayLabel: 'Ollama (Local)'

  allowedAddresses:
    - 'ollama:11434'
    - 'localhost:11434'
    - '127.0.0.1:11434'
    - 'host.docker.internal:11434'

# MCP Servers
mcpServers:
  qwen-image:
    type: stdio
    command: node
    args:
      - '/app/mcp-servers/qwen-image/index.js'
    env:
      DASHSCOPE_API_KEY: '${QWEN_API_KEY}'
    timeout: 120000

actions:
  allowedDomains:
    - 'dashscope-intl.aliyuncs.com'
    - 'dashscope.aliyuncs.com'
  allowedAddresses:
    - 'ollama:11434'
    - 'localhost:11434'
    - '127.0.0.1:11434'
